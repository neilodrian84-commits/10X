<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello — Neil (Alternate Style)</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: linear-gradient(135deg, #3944bc 0%, #223a8e 100%);
      color: #f7f2f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      padding: 32px;
      border-radius: 18px;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2.2rem;
      color: #fff;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #e8def8;
    }
    .small {
      margin-top: 14px;
      color: #c2b2f0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello — I'm Neil</h1>
    <p>This is an alternate style version of your welcome homepage. It uses a darker, modern gradient theme while keeping the page easy to read.</p>
    <p class="small">Open this file in your browser to compare the style with the original hello page.</p>
  </div>
</body>
</html>
